<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90">
  <defs>
    <g id="khatam">
      <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#c9a227" stroke-width="1"/>
      <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="#c9a227" stroke-width="1" transform="rotate(45)"/>
    </g>
  </defs>
  <!-- étoile centrale + étoiles aux coins (se complètent au pavage) -->
