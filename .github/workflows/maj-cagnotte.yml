name: MAJ cagnotte CotizUp

on:
  schedule:
    - cron: "23 */6 * * *" # toutes les 6 h
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  maj:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lire la cagnotte et mettre à jour collecte.js
        run: |
          set -euo pipefail
          URL="https://www.cotizup.com/@ascg-ganges/une-pierre-pour-notre-mosquee"

          # CotizUp (Cloudflare) bloque les IP GitHub : on passe par le
          # proxy de lecture r.jina.ai, qui renvoie la page en texte.
          md=""
          for essai in 1 2 3; do
            md=$(curl -sL --fail --max-time 90 "https://r.jina.ai/${URL}") && break
            echo "Essai ${essai} raté, nouvelle tentative dans 30 s…"
            sleep 30
          done

          # Formats possibles : "€ 2,385 on €500,000" / "2 385 € sur 500 000 €"
          # et "Donors (65)" / "Donateurs (65)".
          montant=$(grep -oiE '€ ?[0-9][0-9,. ]*[0-9]? (on|sur)' <<<"$md" | head -1 | grep -oE '[0-9][0-9,. ]*[0-9]|[0-9]' | head -1 | tr -d ' ,.')
          donateurs=$(grep -oiE '(Donors|Donateurs) \([0-9]+\)' <<<"$md" | head -1 | grep -oE '[0-9]+')

          if [ -z "${montant:-}" ] || [ -z "${donateurs:-}" ]; then
            echo "::error::Impossible d'extraire les chiffres de la page CotizUp (structure changée ou page bloquée)."
            exit 1
          fi
          echo "CotizUp : ${montant} € — ${donateurs} donateurs"

          mois=(janvier février mars avril mai juin juillet août septembre octobre novembre décembre)
          date_fr="$(date -u +%-d) ${mois[$(( $(date -u +%-m) - 1 ))]} $(date -u +%Y)"

          sed -i -E "s/(collecte: )[0-9]+/\1${montant}/" collecte.js
          sed -i -E "s/(donateurs: )[0-9]+/\1${donateurs}/" collecte.js

          # La date n'est réécrite que si un chiffre a bougé,
          # pour ne pas créer un commit à chaque exécution.
          if ! git diff --quiet collecte.js; then
            sed -i -E "s/(maj: \")[^\"]*/\1${date_fr}/" collecte.js
          fi

      - name: Commit et push si changement
        run: |
          set -euo pipefail
          if git diff --quiet collecte.js; then
            echo "Cagnotte inchangée, rien à faire."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add collecte.js
          git commit -m "MAJ auto cagnotte CotizUp"
          git push
